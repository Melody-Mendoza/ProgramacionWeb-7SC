<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16 - Funciones Flecha</title>
    <link rel="stylesheet" href="css/ejercicio16.css">
    <script src="js/ejercicio16.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="contenedor">
        <h1>Calculadora de Operaciones Básicas</h1>
        <label for="numero1">Número 1:</label>
        <input type="text" id="numero1" placeholder="Ej:56" required>
        <br><br>
        <label for="numero2">Número 2:</label>
        <input type="text" id="numero2" placeholder="Ej:6" required>
        <div class="botones">
            <button type="button" onclick="calcularOperacion('sumar')">
                Sumar
            </button>
            <button type="button" onclick="calcularOperacion('restar')">
                Restar
            </button>
            <button type="button" onclick="calcularOperacion('multiplicar')">
                Multiplicar
            </button>
            <button type="button" onclick="calcularOperacion('dividir')">
                Dividir
            </button>
        </div>
        <br><br>
        <label for="resultado">Resultado:</label>
        <input type="text" id="resultado" readonly>


    </div>

</body>

</html>
