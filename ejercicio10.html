<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Temperatura</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="js/ejercicio10.js"></script>
</head>

<body>
    <div class="contenedor">
        <h1>Calculadora de Celsius a Farenheit</h1>
        <form>
            <label>Grados Celsius:</label>
            <input type="number" id="celsius" placeholder="Ingrese los grados Celsius" required>
            <button type="button" onclick="convertir()">
                Convertir Temperatura
            </button>
            <label>Grados Fahrenheit:</label>
            <input type="text" id="fahrenheit" placeholder="Resultado" readonly>
        </form>
    </div>
</body>

</html>
