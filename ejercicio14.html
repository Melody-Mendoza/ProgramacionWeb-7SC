<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordenamiento de números</title>
    <link rel="stylesheet" href="css/ejercicio14.css">
    <script src="js/ejercicio14.js"></script>
</head>

<body>
    <div class="contenedor">
        <h1>ORDENAMOS TUS NÚMEROS</h1>
        <form>
            <label>Ingrese números separados por comas:</label>
            <input type="text" id="numeros" placeholder="Ej:34,3,21,9"  required>
            <button type="button" onclick="ordenar()">
                Calcular
            </button>
            <label>Número Mayor: </label>
            <input type="text" id="numMayor" placeholder="NÚMERO MAYOR" readonly>
            <label>Número menor: </label>
            <input type="text" id="numMenor" placeholder="NÚMERO MENOR" readonly>
            <label>Promedio: </label>
            <input type="text" id="promedio" placeholder="PROMEDIO" readonly>
        </form>
    </div>
</body>

</html>
